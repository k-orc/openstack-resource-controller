---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Domain
metadata:
  name: user-sample
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Project
metadata:
  name: user-sample
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: user-sample
type: Opaque
stringData:
  password: "TestPassword"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: user-sample
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    name: user-sample
    description: User sample
    domainRef: user-sample
    defaultProjectRef: user-sample
    enabled: true
    passwordRef: user-sample
