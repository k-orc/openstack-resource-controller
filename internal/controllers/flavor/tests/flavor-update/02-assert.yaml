---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Flavor
      name: flavor-update
      ref: flavor
assertAll:
    - celExpr: "!has(flavor.status.resource.extraSpecs)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Flavor
metadata:
  name: flavor-update
status:
  resource:
    disk: 0
    isPublic: true
    name: flavor-update
    ram: 1
    vcpus: 2
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
