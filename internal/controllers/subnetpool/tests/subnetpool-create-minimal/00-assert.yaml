---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SubnetPool
metadata:
  name: subnetpool-create-minimal
status:
  resource:
    name: subnetpool-create-minimal
    prefixes:
      - 192.168.10.0/24
    minPrefixLength: 8
    maxPrefixLength: 32
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SubnetPool
      name: subnetpool-create-minimal
      ref: subnetpool
assertAll:
    - celExpr: "subnetpool.status.id != ''"
    - celExpr: "!has(subnetpool.status.resource.description)"
    - celExpr: "!has(subnetpool.status.resource.addressScopeID)"
