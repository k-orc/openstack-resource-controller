---
# This `subnetpool-import-external-not-this-one` resource serves two purposes:
# - ensure that we can successfully create another resource which name is a superstring of it (i.e. it's not being adopted)
# - ensure that importing a resource which name is a superstring of it will not pick this one.
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SubnetPool
metadata:
  name: subnetpool-import-external-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    description: SubnetPool subnetpool-import-external from "subnetpool-import" test
    prefixes:
    - 10.0.0.0/16
    minPrefixLength: 16
    maxPrefixLength: 28
    ipVersion: 4
    shared: false
    isDefault: false
    revisionNumber: 1
