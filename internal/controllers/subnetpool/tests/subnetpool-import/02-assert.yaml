---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SubnetPool
      name: subnetpool-import-external
      ref: subnetpool1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SubnetPool
      name: subnetpool-import-external-not-this-one
      ref: subnetpool2
assertAll:
    - celExpr: "subnetpool1.status.id != subnetpool2.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SubnetPool
metadata:
  name: subnetpool-import
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    name: subnetpool-import-external
    description: SubnetPool subnetpool-import-external from "subnetpool-import" test
    prefixes:
    - 192.168.10.0/24
    minPrefixLength: 16
    maxPrefixLength: 32
    defaultPrefixLength: 16
    shared: false
    isDefault: false
    revisionNumber: 0
