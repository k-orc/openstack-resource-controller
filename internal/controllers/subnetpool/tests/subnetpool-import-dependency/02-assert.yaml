---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SubnetPool
      name: subnetpool-import-dependency
      ref: subnetpool1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SubnetPool
      name: subnetpool-import-dependency-not-this-one
      ref: subnetpool2
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Project
      name: subnetpool-import-dependency
      ref: project
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: AddressScope
      name: subnetpool-import-dependency
      ref: addressScope
assertAll:
    - celExpr: "subnetpool1.status.id != subnetpool2.status.id"
    - celExpr: "subnetpool1.status.resource.projectID == project.status.id"
    - celExpr: "subnetpool1.status.resource.addressScopeID == addressScope.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SubnetPool
metadata:
  name: subnetpool-import-dependency
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
