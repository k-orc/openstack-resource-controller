---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SubnetPool
      name: subnetpool-update
      ref: subnetpool
assertAll:
    - celExpr: "!has(subnetpool.status.resource.description)"
    - celExpr: "!has(subnetpool.status.resource.addressScopeID)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SubnetPool
metadata:
  name: subnetpool-update
status:
  resource:
    name: subnetpool-update
    prefixes:
    - 10.0.0.0/16
    - 192.168.10.0/24
    minPrefixLength: 8
    maxPrefixLength: 32
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
