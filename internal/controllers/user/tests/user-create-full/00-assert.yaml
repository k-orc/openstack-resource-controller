---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: user-create-full
status:
  resource:
    name: user-create-full-override
    enabled: True
    defaultProjectID: "user-create-full"
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: User
      name: user-create-full
      ref: user
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Domain
      name: user-create-full
      ref: domain
assertAll:
    - celExpr: "user.status.id != ''"
    - celExpr: "user.status.resource.domainID == domain.status.id"
   
