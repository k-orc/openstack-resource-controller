---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Domain
metadata:
  name: user-create-full
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: user-create-full
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    name: user-create-full-override
    domainRef: user-create-full
    defaultProjectID: role-create-full
    enabled: True

   
