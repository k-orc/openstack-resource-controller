---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Domain
metadata:
  name: user-import-external-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
# This `user-import-external-not-this-one` resource serves two purposes:
# - ensure that we can successfully create another resource which name is a substring of it (i.e. it's not being adopted)
# - ensure that importing a resource which name is a substring of it will not pick this one.
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: user-import-external-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    domainRef: user-import-external-not-this-one
    defaultProjectID: user-import-external-not-this-one
    enabled: True
