---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: User
      name: user-update
      ref: user
assertAll:
    - celExpr: "user.status.id != ''"
    - celExpr: "user.status.resource.domainID == 'default'"
    - celExpr: "!has(user.status.resource.defaultProjectID)" 
    - celExpr: "!has(user.spec.resource.password)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: user-update
status:
  resource:
    name: user-update
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
