---
apiVersion: v1
kind: Secret
metadata:
  name: user-create-minimal
type: Opaque
stringData:
  password: "TestPassword"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: user-create-minimal
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    passwordRef: user-create-minimal