---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Subnet
      name: subnet-update
      ref: subnet
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Network
      name: subnet-update
      ref: network
assertAll:
    - celExpr: "subnet.status.resource.networkID == network.status.id"
    - celExpr: "!has(subnet.status.resource.tags)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Subnet
metadata:
  name: subnet-update
status:
  resource:
    name: subnet-update
    allocationPools:
      - start: 192.168.0.2
        end: 192.168.0.254
    cidr: 192.168.0.0/24
    dnsPublishFixedIP: false
    enableDHCP: true
    gatewayIP: 192.168.0.1
    ipVersion: 4
    description: ""
    # FIXME(mandre) we should probably have an empty list of tags
    # tags: []
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
