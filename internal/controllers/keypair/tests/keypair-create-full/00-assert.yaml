---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: KeyPair
metadata:
  name: keypair-create-full
status:
  resource:
    # Verify the custom name was used
    name: keypair-create-full-override
    # Type should be ssh as specified
    type: ssh
    # These fields should be populated by OpenStack
    # fingerprint: (dynamically generated)
    # publicKey: (dynamically generated)
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: KeyPair
      name: keypair-create-full
      ref: keypair
assertAll:
    # Verify ID is set
    - celExpr: "keypair.status.id != ''"
    # Verify name override worked
    - celExpr: "keypair.status.resource.name == 'keypair-create-full-override'"
    # Verify type is set
    - celExpr: "keypair.status.resource.type == 'ssh'"
    # Verify fingerprint is populated
    - celExpr: "keypair.status.resource.fingerprint != ''"
    # Verify public key is populated
    - celExpr: "keypair.status.resource.publicKey != ''"
---
apiVersion: v1
kind: Secret
metadata:
  name: keypair-create-full-private-key
type: Opaque
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: v1
      kind: Secret
      name: keypair-create-full-private-key
      ref: secret
assertAll:
    # Verify the private key secret was created
    - celExpr: "secret.data.private_key != null"
    # Verify private key is not empty
    - celExpr: "size(secret.data.private_key) > 0"
