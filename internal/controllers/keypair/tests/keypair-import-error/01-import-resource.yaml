---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: KeyPair
metadata:
  name: keypair-import-error
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      # Use empty string for userID to match all keypairs for the authenticated user
      # This should match both keypair-import-error-1 and keypair-import-error-2
      userID: ""
