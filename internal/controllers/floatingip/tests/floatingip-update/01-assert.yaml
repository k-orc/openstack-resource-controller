---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: FloatingIP
      name: floatingip-update
      ref: floatingIP
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Network
      name: floatingip-update-external
      ref: network
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Router
      name: floatingip-update
      ref: router
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Port
      name: floatingip-update
      ref: port
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: project
      name: floatingip-update
      ref: project
assertAll:
    - celExpr: "floatingIP.status.resource.floatingNetworkID == network.status.id"
    - celExpr: "floatingIP.status.resource.portID == port.status.id"
    - celExpr: "floatingIP.status.resource.routerID == router.status.id"
    - celExpr: "floatingIP.status.resource.projectID == project.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: FloatingIP
metadata:
  name: floatingip-update
status:
  resource:
    description: floatingip-update-updated
    # fixedIP: 10.0.0.20
    fixedIP: 10.0.0.10
    floatingIP: 192.168.155.5
    tags:
      - tag1
      - tag2
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success