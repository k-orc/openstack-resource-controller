---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SwiftContainer
metadata:
  name: swiftcontainer-create-minimal
status:
  resource:
    name: swiftcontainer-create-minimal
    bytesUsed: 0
    objectCount: 0
    storagePolicy: Policy-0
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SwiftContainer
      name: swiftcontainer-create-minimal
      ref: swiftcontainer
assertAll:
    - celExpr: "swiftcontainer.status.id != ''"
    - celExpr: "swiftcontainer.status.id == 'swiftcontainer-create-minimal'"
    - celExpr: "!has(swiftcontainer.status.resource.metadata)"
    - celExpr: "!has(swiftcontainer.status.resource.containerRead)"
    - celExpr: "!has(swiftcontainer.status.resource.containerWrite)"
