---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SwiftContainer
      name: swiftcontainer-import-external
      ref: swiftcontainer1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SwiftContainer
      name: swiftcontainer-import-external-not-this-one
      ref: swiftcontainer2
assertAll:
    - celExpr: "swiftcontainer1.status.id != swiftcontainer2.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SwiftContainer
metadata:
  name: swiftcontainer-import
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    name: swiftcontainer-import-external
    description: SwiftContainer swiftcontainer-import-external from "swiftcontainer-import" test
    # TODO(scaffolding): Add all fields the resource supports
