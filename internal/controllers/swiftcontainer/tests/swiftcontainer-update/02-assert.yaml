---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SwiftContainer
      name: swiftcontainer-update
      ref: swiftcontainer
assertAll:
    - celExpr: "swiftcontainer.status.id == 'swiftcontainer-update'"
    - celExpr: "!has(swiftcontainer.status.resource.metadata)"
    - celExpr: "!has(swiftcontainer.status.resource.containerRead)"
    - celExpr: "!has(swiftcontainer.status.resource.containerWrite)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SwiftContainer
metadata:
  name: swiftcontainer-update
status:
  resource:
    name: swiftcontainer-update
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
