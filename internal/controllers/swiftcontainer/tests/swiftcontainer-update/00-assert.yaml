---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: SwiftContainer
      name: swiftcontainer-update
      ref: swiftcontainer
assertAll:
    - celExpr: "!has(swiftcontainer.status.resource.description)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: SwiftContainer
metadata:
  name: swiftcontainer-update
status:
  resource:
    name: swiftcontainer-update
    # TODO(scaffolding): Add matches for more fields
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
