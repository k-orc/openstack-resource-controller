---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Project
metadata:
  name: project-dependency-no-secret
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Project
metadata:
  name: project-dependency-no-domain
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Project
      name: project-dependency-no-domain
      ref: project
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Domain
      name: project-dependency
      ref: domain
assertAll:
    - celExpr: "project.status.resource.domainID == domain.status.id"
