---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: applicationcredential-import-external
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      name: admin
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: ApplicationCredential
metadata:
  name: applicationcredential-import
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      name: applicationcredential-import-external
      description: ApplicationCredential applicationcredential-import-external from "applicationcredential-import" test
      userRef: applicationcredential-import-external
