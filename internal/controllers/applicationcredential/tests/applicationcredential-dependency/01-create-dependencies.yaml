---
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - command: kubectl create secret generic applicationcredential-dependency --from-file=clouds.yaml=${E2E_KUTTL_OSCLOUDS} ${E2E_KUTTL_CACERT_OPT}
    namespaced: true
  - command: kubectl create secret generic applicationcredential-dependency-pending --from-literal=value=abc123
    namespaced: true
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: applicationcredential-dependency-pending
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      name: admin
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Role
metadata:
  name: applicationcredential-dependency-pending
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      name: reader
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: applicationcredential-dependency-pending
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      type: "compute"
