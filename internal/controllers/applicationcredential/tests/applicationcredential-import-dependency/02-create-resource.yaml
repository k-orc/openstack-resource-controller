---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: applicationcredential-import-dependency-external
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    description: application-credential external user
    passwordRef: application-credential-user-password
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: ApplicationCredential
metadata:
  name: applicationcredential-import-dependency-external
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    description: application-credential-import-dependency-target
    userRef: applicationcredential-import-dependency-external
    secretRef: application-credential-secret
