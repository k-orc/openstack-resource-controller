---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: applicationcredential-import-dependency
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      name: applicationcredential-import-dependency-external
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: ApplicationCredential
metadata:
  name: applicationcredential-import-dependency
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      userRef: applicationcredential-import-dependency
      description: application-credential-import-dependency-target
