---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: User
metadata:
  name: applicationcredential-import-dependency-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      name: admin
---
# This `applicationcredential-import-dependency-not-this-one` should not be picked by the import filter
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: ApplicationCredential
metadata:
  name: applicationcredential-import-dependency-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    description: application-credential-import-dependency-target
    userRef: applicationcredential-import-dependency-not-this-one
    secretRef: application-credential-secret
