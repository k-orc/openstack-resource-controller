---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: service-create-minimal-without-name
status:
  conditions:
  - type: Available
    status: "False"
    reason: InvalidConfiguration
  - type: Progressing
    status: "False"
    reason: InvalidConfiguration
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Service
      name: service-create-minimal-without-name
      ref: service_unnamed
assertAll:
    - celExpr: "!has(service_unnamed.status.id)"
    - celExpr: "!has(service_unnamed.status.resource)" # The resource must not be created.
