---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: service-import-external-not-this-one
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    type: service-import
    extra:
      name: service-import-external
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: service-import
status:
  conditions:
    - type: Available
      message: Waiting for OpenStack resource to be created externally
      status: "False"
      reason: Progressing
    - type: Progressing
      message: Waiting for OpenStack resource to be created externally
      status: "True"
      reason: Progressing
