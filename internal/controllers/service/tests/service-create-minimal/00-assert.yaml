---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: service-create-minimal
status:
  resource:
    type: "service"
    extra:
      name: "service-create-minimal"
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Service
      name: service-create-minimal
      ref: service
assertAll:
    - celExpr: "service.status.id != ''"
    - celExpr: "service.status.resource.extra.name != ''"
    - celExpr: "service.status.resource.type != ''"
    - celExpr: "!has(service.status.resource.extra.description)"
    - celExpr: "!has(service.status.resource.extra.enabled)"
