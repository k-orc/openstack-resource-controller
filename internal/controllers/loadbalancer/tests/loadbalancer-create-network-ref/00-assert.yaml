---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: LoadBalancer
metadata:
  name: loadbalancer-create-network-ref
status:
  resource:
    adminStateUp: true
    provisioningStatus: ACTIVE
  conditions:
    - type: Available
      status: "True"
      reason: Success
    - type: Progressing
      status: "False"
      reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: LoadBalancer
      name: loadbalancer-create-network-ref
      ref: loadbalancer
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Network
      name: loadbalancer-create-network-ref
      ref: network
assertAll:
    - celExpr: "loadbalancer.status.id != ''"
    - celExpr: "loadbalancer.status.resource.vipAddress != ''"
    - celExpr: "loadbalancer.status.resource.vipNetworkID == network.status.id"
