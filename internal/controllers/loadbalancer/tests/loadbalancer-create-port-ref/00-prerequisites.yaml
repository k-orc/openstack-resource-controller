---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Network
metadata:
  name: loadbalancer-create-port-ref
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Subnet
metadata:
  name: loadbalancer-create-port-ref
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    networkRef: loadbalancer-create-port-ref
    ipVersion: 4
    cidr: 192.168.103.0/24
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Port
metadata:
  name: loadbalancer-create-port-ref
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    networkRef: loadbalancer-create-port-ref
