---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: LoadBalancer
metadata:
  name: loadbalancer-create-full
status:
  resource:
    name: loadbalancer-create-full-override
    description: LoadBalancer from "create full" test
    adminStateUp: false
    provisioningStatus: ACTIVE
    tags:
      - tag1
      - tag2
  conditions:
    - type: Available
      status: "True"
      reason: Success
    - type: Progressing
      status: "False"
      reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: LoadBalancer
      name: loadbalancer-create-full
      ref: loadbalancer
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Subnet
      name: loadbalancer-create-full
      ref: subnet
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Project
      name: loadbalancer-create-full
      ref: project
assertAll:
    - celExpr: "loadbalancer.status.id != ''"
    - celExpr: "loadbalancer.status.resource.name == 'loadbalancer-create-full-override'"
    - celExpr: "loadbalancer.status.resource.description == 'LoadBalancer from \"create full\" test'"
    - celExpr: "loadbalancer.status.resource.adminStateUp == false"
    - celExpr: "loadbalancer.status.resource.vipSubnetID == subnet.status.id"
    - celExpr: "loadbalancer.status.resource.projectID == project.status.id"
    - celExpr: "'tag1' in loadbalancer.status.resource.tags"
    - celExpr: "'tag2' in loadbalancer.status.resource.tags"
