apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - command: kubectl create secret generic openstack-clouds --from-file=clouds.yaml=${E2E_KUTTL_OSCLOUDS} ${E2E_KUTTL_CACERT_OPT}
    namespaced: true
---
# Networks and subnets are created here to be used as VIP subnets for the
# external load balancers created in subsequent steps.
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Network
metadata:
  name: loadbalancer-import
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Subnet
metadata:
  name: loadbalancer-import
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    networkRef: loadbalancer-import
    ipVersion: 4
    cidr: 192.168.105.0/24
---
# A second network+subnet used by the "trap" load balancer in step 01.
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Network
metadata:
  name: loadbalancer-import-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Subnet
metadata:
  name: loadbalancer-import-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    networkRef: loadbalancer-import-not-this-one
    ipVersion: 4
    cidr: 192.168.106.0/24
