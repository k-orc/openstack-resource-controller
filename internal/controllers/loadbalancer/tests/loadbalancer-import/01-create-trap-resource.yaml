---
# This `loadbalancer-import-external-not-this-one` resource serves two purposes:
# - ensure that we can successfully create another resource whose name is a superstring of it (i.e. it's not being adopted)
# - ensure that importing a resource whose name is a substring of it will not pick this one.
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: LoadBalancer
metadata:
  name: loadbalancer-import-external-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    subnetRef: loadbalancer-import-not-this-one
    description: LoadBalancer from "loadbalancer-import" test
    tags:
      - tag1
