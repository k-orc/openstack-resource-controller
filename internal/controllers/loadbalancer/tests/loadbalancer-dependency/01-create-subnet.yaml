---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Network
metadata:
  name: loadbalancer-dependency
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource: {}
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Subnet
metadata:
  name: loadbalancer-dependency
spec:
  cloudCredentialsRef:
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    networkRef: loadbalancer-dependency
    ipVersion: 4
    cidr: 192.168.104.0/24
