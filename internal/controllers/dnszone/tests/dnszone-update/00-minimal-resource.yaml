---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: DNSZone
metadata:
  name: dnszone-update
spec:
  cloudCredentialsRef:
    # TODO(scaffolding): Use openstack-admin if the resource needs admin credentials to be created or updated
    cloudName: openstack
    secretName: openstack-clouds
  managementPolicy: managed
  # TODO(scaffolding): Only add the mandatory fields. It's possible the resource
  # doesn't have mandatory fields, in that case, leave it empty.
  resource:
    name: update-updated.example.com.
    email: admin@example.com
