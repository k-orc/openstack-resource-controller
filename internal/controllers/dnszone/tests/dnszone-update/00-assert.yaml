---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: DNSZone
      name: dnszone-update
      ref: dnszone
assertAll:
    - celExpr: "!has(dnszone.status.resource.description)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: DNSZone
metadata:
  name: dnszone-update
status:
  resource:
    name: dnszone-update
    # TODO(scaffolding): Add matches for more fields
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
