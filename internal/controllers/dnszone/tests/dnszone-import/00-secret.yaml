apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - command: kubectl create secret generic openstack-clouds --from-file=clouds.yaml=${E2E_KUTTL_OSCLOUDS} ${E2E_KUTTL_CACERT_OPT}
    namespaced: true
  - script: |
      set -xe
      export OS_CLIENT_CONFIG_FILE=${E2E_KUTTL_OSCLOUDS}
      export OS_CLOUD=openstack

      # Clean up any pre-existing zone from a previous run
      openstack zone delete kuttl-import.example.com. || true

      # Pre-create the zone in Designate
      openstack zone create --email admin@example.com --ttl 3600 --description "KUTTL Import test zone" kuttl-import.example.com.

      # Get the zone ID
      ZONE_ID=$(openstack zone show kuttl-import.example.com. -f value -c id)
      if [ -z "$ZONE_ID" ]; then
        echo "Failed to get zone ID"
        exit 1
      fi

      # Generate the unmanaged DNSZone CR manifest with spec.import.id
      cat <<EOF > 01-import-resource.yaml
      apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: DNSZone
      metadata:
        name: dnszone-import-unmanaged
      spec:
        cloudCredentialsRef:
          cloudName: openstack
          secretName: openstack-clouds
        managementPolicy: unmanaged
        import:
          id: ${ZONE_ID}
      EOF

      kubectl -n "${NAMESPACE}" apply -f 01-import-resource.yaml
