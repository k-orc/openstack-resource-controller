---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: DNSZone
      name: dnszone-import-external
      ref: dnszone1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: DNSZone
      name: dnszone-import-external-not-this-one
      ref: dnszone2
assertAll:
    - celExpr: "dnszone1.status.id != dnszone2.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: DNSZone
metadata:
  name: dnszone-import
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    name: dnszone-import-external
    description: DNSZone dnszone-import-external from "dnszone-import" test
    # TODO(scaffolding): Add all fields the resource supports
