---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
  - apiVersion: openstack.k-orc.cloud/v1alpha1
    kind: AddressScope
    name: addressscope-update
    ref: addressscope
  - apiVersion: openstack.k-orc.cloud/v1alpha1
    kind: AddressScope
    name: addressscope-update-shared
    ref: addressscopeShared
assertAll:
  - celExpr: "addressscope.status.resource.projectID != ''"
  - celExpr: "addressscopeShared.status.resource.projectID != ''"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: AddressScope
metadata:
  name: addressscope-update
status:
  resource:
    name: addressscope-update
    ipVersion: 4
    shared: false
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: AddressScope
metadata:
  name: addressscope-update-shared
status:
  resource:
    name: addressscope-update-shared
    ipVersion: 4
    shared: false
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
