---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Region
      name: region-import-external
      ref: region1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Region
      name: region-import-external-not-this-one
      ref: region2
assertAll:
    - celExpr: "region1.status.id != region2.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Region
metadata:
  name: region-import
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    name: region-import-external
    description: Region region-import-external from "region-import" test
