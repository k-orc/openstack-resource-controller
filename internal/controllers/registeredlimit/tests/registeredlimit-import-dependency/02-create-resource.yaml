---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: registeredlimit-import-dependency-external
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    type: registeredlimit-import-dependency-external
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RegisteredLimit
metadata:
  name: registeredlimit-import-dependency-external
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    serviceRef: registeredlimit-import-dependency-external
    resourceName: memory
    defaultLimit: 10
