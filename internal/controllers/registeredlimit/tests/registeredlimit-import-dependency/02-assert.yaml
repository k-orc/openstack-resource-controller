---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RegisteredLimit
      name: registeredlimit-import-dependency
      ref: registeredlimit1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RegisteredLimit
      name: registeredlimit-import-dependency-not-this-one
      ref: registeredlimit2
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Service
      name: registeredlimit-import-dependency
      ref: service
assertAll:
    - celExpr: "registeredlimit1.status.id != registeredlimit2.status.id"
    - celExpr: "registeredlimit1.status.resource.serviceID == service.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RegisteredLimit
metadata:
  name: registeredlimit-import-dependency
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
