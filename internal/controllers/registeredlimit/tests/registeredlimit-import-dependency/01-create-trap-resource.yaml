---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: registeredlimit-import-dependency-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    type: registeredlimit-import-dependency-not-this-one
---
# This `registeredlimit-import-dependency-not-this-one` should not be picked by the import filter
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RegisteredLimit
metadata:
  name: registeredlimit-import-dependency-not-this-one
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: managed
  resource:
    serviceRef: registeredlimit-import-dependency-not-this-one
    resourceName: vcpus
    defaultLimit: 5
