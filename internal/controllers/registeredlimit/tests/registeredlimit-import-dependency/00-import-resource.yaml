---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Service
metadata:
  name: registeredlimit-import-dependency
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      name: registeredlimit-import-dependency-external
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RegisteredLimit
metadata:
  name: registeredlimit-import-dependency
spec:
  cloudCredentialsRef:
    cloudName: openstack-admin
    secretName: openstack-clouds
  managementPolicy: unmanaged
  import:
    filter:
      serviceRef: registeredlimit-import-dependency
