---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RegisteredLimit
      name: registeredlimit-update
      ref: registeredlimit
assertAll:
    - celExpr: "!has(registeredlimit.status.resource.description)"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RegisteredLimit
metadata:
  name: registeredlimit-update
status:
  resource:
    name: registeredlimit-update
    # TODO(scaffolding): Add matches for more fields
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
