---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Share
metadata:
  name: share-create-full
status:
  resource:
    name: share-create-full-override
    description: Share from "create full" test
    shareProto: NFS
    size: 10
    status: available
    isPublic: false
    metadata:
      test: full
      component: e2e
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Share
      name: share-create-full
      ref: share
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: ShareNetwork
      name: share-create-full
      ref: shareNetwork
assertAll:
    - celExpr: "share.status.id != ''"
    - celExpr: "share.status.resource.shareNetworkID == shareNetwork.status.id"
    - celExpr: "share.status.resource.shareProto == 'NFS'"
    - celExpr: "share.status.resource.size == 10"
    - celExpr: "share.status.resource.isPublic == false"
    - celExpr: "share.status.resource.metadata.test == 'full'"
