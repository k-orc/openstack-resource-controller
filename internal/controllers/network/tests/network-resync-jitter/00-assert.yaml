---
# Verify all three networks are available and each has lastSyncTime set after
# the initial successful reconciliation.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Network
      name: network-resync-jitter-1
      ref: network1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Network
      name: network-resync-jitter-2
      ref: network2
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Network
      name: network-resync-jitter-3
      ref: network3
assertAll:
    - celExpr: "has(network1.status.lastSyncTime) && network1.status.lastSyncTime != ''"
    - celExpr: "has(network2.status.lastSyncTime) && network2.status.lastSyncTime != ''"
    - celExpr: "has(network3.status.lastSyncTime) && network3.status.lastSyncTime != ''"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Network
metadata:
  name: network-resync-jitter-1
status:
  conditions:
    - type: Available
      status: "True"
      reason: Success
    - type: Progressing
      status: "False"
      reason: Success
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Network
metadata:
  name: network-resync-jitter-2
status:
  conditions:
    - type: Available
      status: "True"
      reason: Success
    - type: Progressing
      status: "False"
      reason: Success
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Network
metadata:
  name: network-resync-jitter-3
status:
  conditions:
    - type: Available
      status: "True"
      reason: Success
    - type: Progressing
      status: "False"
      reason: Success
