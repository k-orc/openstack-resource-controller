---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Trunk
      name: trunk-import
      ref: importedTrunk
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Trunk
      name: trunk-import-external
      ref: externalTrunk
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Trunk
      name: trunk-import-external-not-this-one
      ref: trapTrunk
assertAll:
    # Verify the imported trunk picked up the correct external trunk (not the trap)
    - celExpr: "importedTrunk.status.id == externalTrunk.status.id"
    - celExpr: "importedTrunk.status.id != trapTrunk.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Trunk
metadata:
  name: trunk-import
status:
  conditions:
    - type: Available
      status: "True"
      reason: Success
    - type: Progressing
      status: "False"
      reason: Success
  resource:
    name: trunk-import-external
    description: Trunk trunk-import-external from "trunk-import" test
    adminStateUp: true
    status: ACTIVE
    tags:
      - trunk-import-tag
