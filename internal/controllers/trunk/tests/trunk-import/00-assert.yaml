---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Trunk
metadata:
  name: trunk-import-external
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    name: trunk-import-external
    description: Trunk trunk-import-external from "trunk-import" test
    adminStateUp: true
    status: ACTIVE
    tags:
      - trunk-import-tag
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Trunk
metadata:
  name: trunk-import
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    name: trunk-import-external
    description: Trunk trunk-import-external from "trunk-import" test
    adminStateUp: true
    status: ACTIVE
    tags:
      - trunk-import-tag
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Trunk
      name: trunk-import-external
      ref: trunkExternal
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Trunk
      name: trunk-import
      ref: trunkImport
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Project
      name: trunk-import
      ref: project
assertAll:
    - celExpr: "trunkExternal.status.id == trunkImport.status.id"
    - celExpr: "trunkImport.status.resource.projectID == project.status.id"
