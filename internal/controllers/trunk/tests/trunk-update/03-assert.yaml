---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Trunk
metadata:
  name: trunk-update
status:
  resource:
    name: trunk-update
    adminStateUp: true
    status: ACTIVE
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Trunk
      name: trunk-update
      ref: trunk
assertAll:
    - celExpr: "!has(trunk.status.resource.description)"
    - celExpr: "!has(trunk.status.resource.tags) || trunk.status.resource.tags.size() == 0"
    - celExpr: "!has(trunk.status.resource.subports) || trunk.status.resource.subports.size() == 0"

