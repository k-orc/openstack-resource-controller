# Update subports: remove subport2, add subport3, change subport1 segmentation
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Trunk
metadata:
  name: trunk-update
spec:
  resource:
    adminStateUp: true
    subports:
    - portRef: trunk-update-subport1
      segmentationID: 150
      segmentationType: vlan
    - portRef: trunk-update-subport3
      segmentationID: 300
      segmentationType: vlan
