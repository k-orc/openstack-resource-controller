# Revert trunk to minimal state but keep it enabled for deletion
# NOTE: kuttl only does patch updates, which means we can't delete a field.
# We have to use a kubectl replace command instead.
# First enable the trunk, then replace with minimal enabled resource.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - command: kubectl replace -f 00-minimal-resource.yaml
    namespaced: true
  - command: kubectl patch trunk trunk-update --type=merge -p '{"spec":{"resource":{"adminStateUp":true}}}'
    namespaced: true
