---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RoleAssignment
metadata:
  name: roleassignment-create-full
status:
  resource:
    name: roleassignment-create-full-override
    description: RoleAssignment from "create full" test
    # TODO(scaffolding): Add all fields the resource supports
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RoleAssignment
      name: roleassignment-create-full
      ref: roleassignment
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Role
      name: roleassignment-create-full
      ref: role
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: User
      name: roleassignment-create-full
      ref: user
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Group
      name: roleassignment-create-full
      ref: group
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Project
      name: roleassignment-create-full
      ref: project
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Domain
      name: roleassignment-create-full
      ref: domain
assertAll:
    - celExpr: "roleassignment.status.id != ''"
    - celExpr: "roleassignment.status.resource.roleID == role.status.id"
    - celExpr: "roleassignment.status.resource.userID == user.status.id"
    - celExpr: "roleassignment.status.resource.groupID == group.status.id"
    - celExpr: "roleassignment.status.resource.projectID == project.status.id"
    - celExpr: "roleassignment.status.resource.domainID == domain.status.id"
    # TODO(scaffolding): Add more checks
