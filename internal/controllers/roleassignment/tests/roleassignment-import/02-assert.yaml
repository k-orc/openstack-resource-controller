---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RoleAssignment
      name: roleassignment-import-external
      ref: roleassignment1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RoleAssignment
      name: roleassignment-import-external-not-this-one
      ref: roleassignment2
assertAll:
    - celExpr: "roleassignment1.status.id != roleassignment2.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RoleAssignment
metadata:
  name: roleassignment-import
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
  resource:
    name: roleassignment-import-external
    description: RoleAssignment roleassignment-import-external from "roleassignment-import" test
    # TODO(scaffolding): Add all fields the resource supports
