---
# Verify Project still exists (deletion blocked by finalizer)
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: Project
metadata:
  name: roleassignment-dep-project
  # deletionTimestamp should be set, but resource should still exist
status:
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
# Verify RoleAssignment still Available
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RoleAssignment
metadata:
  name: roleassignment-dependency
status:
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
