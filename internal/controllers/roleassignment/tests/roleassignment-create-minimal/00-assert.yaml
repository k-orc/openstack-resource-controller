---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RoleAssignment
metadata:
  name: roleassignment-create-minimal
status:
  resource:
    name: roleassignment-create-minimal
    # TODO(scaffolding): Add all fields the resource supports
  conditions:
  - type: Available
    status: "True"
    reason: Success
  - type: Progressing
    status: "False"
    reason: Success
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RoleAssignment
      name: roleassignment-create-minimal
      ref: roleassignment
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Role
      name: roleassignment-create-minimal
      ref: role
assertAll:
    - celExpr: "roleassignment.status.id != ''"
    - celExpr: "roleassignment.status.resource.roleID == role.status.id"
    # TODO(scaffolding): Add more checks
