---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
resourceRefs:
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RoleAssignment
      name: roleassignment-import-dependency
      ref: roleassignment1
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: RoleAssignment
      name: roleassignment-import-dependency-not-this-one
      ref: roleassignment2
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Role
      name: roleassignment-import-dependency
      ref: role
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: User
      name: roleassignment-import-dependency
      ref: user
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Group
      name: roleassignment-import-dependency
      ref: group
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Project
      name: roleassignment-import-dependency
      ref: project
    - apiVersion: openstack.k-orc.cloud/v1alpha1
      kind: Domain
      name: roleassignment-import-dependency
      ref: domain
assertAll:
    - celExpr: "roleassignment1.status.id != roleassignment2.status.id"
    - celExpr: "roleassignment1.status.resource.roleID == role.status.id"
    - celExpr: "roleassignment1.status.resource.userID == user.status.id"
    - celExpr: "roleassignment1.status.resource.groupID == group.status.id"
    - celExpr: "roleassignment1.status.resource.projectID == project.status.id"
    - celExpr: "roleassignment1.status.resource.domainID == domain.status.id"
---
apiVersion: openstack.k-orc.cloud/v1alpha1
kind: RoleAssignment
metadata:
  name: roleassignment-import-dependency
status:
  conditions:
    - type: Available
      message: OpenStack resource is available
      status: "True"
      reason: Success
    - type: Progressing
      message: OpenStack resource is up to date
      status: "False"
      reason: Success
