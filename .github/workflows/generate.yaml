on:
  push:
    branches:
    - release-2.0
  merge_group:
  pull_request:
name: generate
permissions:
  contents: read

jobs:
  make-generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          persist-credentials: false

      - run: |
          make generate
          git diff --exit-code
